<div class='number' *ngIf='!disabled'>
    <span class='value'>{{((value * factor) + offset).toFixed(decimals)}}</span>
    <span class='unit'>{{unit}}</span>
    <span
        class='button'
        (mousedown)='press(Direction.DOWN)'
        (mouseup)='release(Direction.DOWN)'
        >
        <span class='material'>remove</span>
    </span>
    <span
        class='button'
        (mousedown)='press(Direction.UP)'
        (mouseup)='release(Direction.UP)'
        >
        <span class='material'>add</span>
    </span>
</div>

<div class='number disabled' *ngIf='disabled'>
    <span class='value'>{{disabledMessage}}</span>
</div>
